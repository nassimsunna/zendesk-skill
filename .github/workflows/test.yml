name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mcp-version:
          - 'mcp[cli]==1.8.0'
          - 'mcp[cli]>=1.8.0,<2'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify lockfile is in sync
        run: uv lock --check

      - name: Install project and test dependencies from lockfile
        run: uv sync --all-groups --frozen

      - name: Run complete pytest suite
        run: uv run --with "${{ matrix.mcp-version }}" pytest
